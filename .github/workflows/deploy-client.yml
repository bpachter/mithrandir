name: Deploy Enkidu Client

on:
  push:
    branches: [main]
    paths: ['phase6-ui/client/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: phase6-ui/client/package-lock.json

      - run: npm ci
        working-directory: phase6-ui/client

      - name: Build
        run: npm run build
        working-directory: phase6-ui/client
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./phase6-ui/client/dist
