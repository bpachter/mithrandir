name: Deploy Mithrandir Client

on:
  push:
    branches: [main]
    paths:
      - 'phase6-ui/client/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: phase6-ui/client/package-lock.json

      - run: npm ci
        working-directory: phase6-ui/client

      - name: Build
        run: npm run build
        working-directory: phase6-ui/client
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_BASE_PATH: /mithrandir/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./phase6-ui/client/dist
          force_orphan: true
          enable_jekyll: false
